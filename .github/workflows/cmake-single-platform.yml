name: CMake on a single platform

on:
  push:
    branches: [ "main", "morphology"]
  pull_request:
    branches: [ "main", "morphology"]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Download requirements
      run: sudo pip3 install xcrun gcovr && sudo apt-get update && sudo apt-get install -y lcov libxrandr-dev libxcursor-dev libudev-dev libopenal-dev libflac-dev libvorbis-dev libgl1-mesa-dev libegl1-mesa-dev freeglut3-dev clang-tidy

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DENABLE_COVERAGE=true

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Run clang-tidy with --fix
      run: cmake --build build --target run-clang-tidy

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ctest --output-on-failure

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4.0.1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: CSRT-NTUA/AlgoPlus

    - name: Upload to codecov
      run: bash <(curl -s https://codecov.io/bash)
